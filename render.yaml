services:
  - type: web
    name: reelnews-chatbot
    env: static
    buildCommand: "echo \"window.__ENV__ = { FLOWISE_API_URL: '${FLOWISE_API_URL}', CHATFLOW_ID: '${CHATFLOW_ID}' };\" > env-config.js"
    staticPublishPath: .
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
